<!DOCTYPE html>
<style>
    body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .cell {
            width: 80px;
            height: 80px;
            background: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            text-decoration: none;
            color: black;
            border-radius: 10px;
            transition: 0.3s;
        }

        .cell:hover {
            background: #ddd;
        }

        .reset {
            text-decoration: none;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .reset:hover {
            background: #764ba2;
        }

        .winner {
            color: green;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>🎮 Tic Tac Toe</h1>

    {% if winner %}
        <h2 class="winner">Player {{winner}} Wins 🎉</h2>
    {% else %}
        <h3>Current Player: {{player}}</h3>
    {% endif %}

    <div class="board">
        {% for i in range(9) %}
            <a href="/move/{{i}}" class="cell">
                {{ board[i] }}
            </a>
        {% endfor %}
    </div>

    <a href="/reset" class="reset">Reset Game</a>

</div>

</body>
</html>
