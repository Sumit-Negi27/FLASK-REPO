{% extends "base.html" %}
{% block style %}<style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            margin: auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #3498db;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>{% endblock style %}
{% block content %}<div class="container">
        <h2>Welcome 🎉</h2>
        <p>You have successfully logged in.</p>

        <button onclick="goBack()">goBack</button>
    </div>{% endblock content %}
    {% block script %}<script>
        function goBack() {
            window.history.back();
        }
    </script>{% endblock script %}
