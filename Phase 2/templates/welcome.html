<!DOCTYPE html>
<html>
<head>
    <title>Welcome Page</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
            width:400px;
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
            margin-top:10px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            border:none;
            background:#4facfe;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#00c6ff;
        }
    </style>

</head>

<body>

    <div class="container">
        <h1>Welcome {{username}} 🎉</h1>

        <p>You have successfully logged in to the system.</p>

        <p>This is your dashboard welcome page.</p>

        <button onclick="window.location.href='/'">
            Logout
        </button>
    </div>

</body>
</html>
